# SPDX-License-Identifier: Apache-2.0 WITH LLVM-exception

name: Makefile Workflow Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '30 15 * * *'
permissions:
  contents: read

jobs:
  test_matrix:
    strategy:
      fail-fast: false
    name: Test System Compiler with Makefile
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/bemanproject/testingcontainers-gcc:14@sha256:f7b898e2deb9b470fa47991c5fd37deb151348c1340921c1bf53a731d263e55f # ratchet:ghcr.io/bemanproject/testingcontainers-gcc:14
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          # Install a specific version of uv.
          version: "0.11.6"
      - name: Install system tools
        shell: bash
        run: |
          sudo apt update
          sudo apt -y install build-essential gcc-14 g++-14 ccache jq
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14 \
            --slave /usr/bin/gcov gcov /usr/bin/gcov-14
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-14  100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-14 100
          sudo update-alternatives --set gcc  /usr/bin/gcc-14
          sudo update-alternatives --set cc  /usr/bin/gcc-14
          sudo update-alternatives --set c++  /usr/bin/g++-14

      - name: Configure Environment
        shell: bash
        run: |
          make venv

        env:
          CMAKE_GENERATOR: "Ninja Multi-Config"
      - name: Build
        shell: bash
        run: |
          source .venv/bin/activate
          make compile
      - name: Test
        shell: bash
        run: |
          source .venv/bin/activate
          make test
      - name: Generate Coverage Files
        shell: bash
        run: |
          source .venv/bin/activate
          make coverage
      - name: Lint
        shell: bash
        run: |
          source .venv/bin/activate
          make lint
      - name: Manual Lint
        shell: bash
        run: |
          source .venv/bin/activate
          make lint
      - name: Test Install
        shell: bash
        run: |
          source .venv/bin/activate
          make testinstall
